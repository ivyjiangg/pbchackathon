<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Aegis</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0a0a12;
      --card:    #12121e;
      --sidebar: #0e0e1a;
      --border:  rgba(255,255,255,0.07);
      --blue:    #3b82f6;
      --green:   #10b981;
      --red:     #ef4444;
      --amber:   #f59e0b;
      --text:    #e2e8f0;
      --muted:   #64748b;
      --dim:     #44445a;
      --mono:    'SF Mono', 'Fira Code', Consolas, monospace;
      --dot-bg:  radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px) 24px 24px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      height: 100vh;
      overflow: hidden;
      display: flex;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 204px;
      min-width: 204px;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 0;
    }
    .sidebar-logo {
      padding: 22px 20px 20px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-logo-text {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: #fff;
    }
    .sidebar-logo-sub {
      font-size: 11px;
      color: var(--dim);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 3px;
    }
    .nav-section-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--dim);
      padding: 18px 20px 6px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 20px;
      cursor: pointer;
      color: var(--muted);
      font-size: 13px;
      border-left: 2px solid transparent;
      transition: all 0.12s;
      position: relative;
    }
    .nav-item:hover { color: var(--text); background: rgba(255,255,255,0.025); }
    .nav-item.active {
      color: var(--blue);
      border-left-color: var(--blue);
      background: rgba(59,130,246,0.06);
    }
    .nav-badge {
      margin-left: auto;
      background: rgba(245,158,11,0.18);
      color: var(--amber);
      border-radius: 999px;
      font-size: 10px;
      padding: 1px 7px;
    }
    .agent-status-block {
      margin-top: auto;
      padding: 16px 20px;
      border-top: 1px solid var(--border);
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
    }
    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
      animation: pulse-green 2s ease-in-out infinite;
    }
    .status-dot.offline { background: var(--dim); animation: none; }
    @keyframes pulse-green {
      0%,100% { box-shadow: 0 0 0 0 rgba(16,185,129,0.5); }
      50%      { box-shadow: 0 0 0 4px rgba(16,185,129,0); }
    }
    .status-key {
      margin-top: 5px;
      font-size: 11px;
      color: var(--dim);
      font-family: var(--mono);
      word-break: break-all;
    }

    /* ── MAIN ── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .topbar {
      padding: 14px 28px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--sidebar);
      flex-shrink: 0;
    }
    .topbar-title { font-size: 13px; font-weight: 500; color: var(--text); }
    .topbar-status { font-size: 11px; font-family: var(--mono); color: var(--muted); }
    .topbar-warn { color: var(--amber); }
    .content { flex: 1; overflow-y: auto; padding: 24px 28px; }

    /* ── CARDS ── */
    .card {
      background: var(--card);
      background-image: var(--dot-bg);
      background-color: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      transition: border-color 0.15s;
    }
    .card:hover { border-color: rgba(59,130,246,0.22); }
    .card + .card { margin-top: 16px; }

    /* ── GRIDS ── */
    .grid-4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 16px; }
    .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; }
    .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 14px; }

    /* ── STAT CARDS ── */
    .stat-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .stat-value {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 28px;
      color: #fff;
      line-height: 1;
    }
    .stat-sub {
      margin-top: 7px;
      font-size: 11px;
      color: var(--muted);
      font-family: var(--mono);
    }

    /* ── BUDGET BARS ── */
    .budget-row { margin-bottom: 14px; }
    .budget-row:last-child { margin-bottom: 0; }
    .budget-hdr { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
    .budget-name { font-size: 11px; text-transform: uppercase; letter-spacing: 0.09em; color: var(--muted); }
    .budget-nums { font-size: 12px; font-family: var(--mono); color: var(--text); }
    .budget-track { height: 3px; background: rgba(255,255,255,0.06); border-radius: 999px; overflow: hidden; }
    .budget-fill { height: 100%; border-radius: 999px; background: var(--blue); transition: width 0.5s ease; }
    .budget-fill.warn   { background: var(--amber); }
    .budget-fill.danger { background: var(--red); }

    /* ── PILLS ── */
    .pill {
      display: inline-flex;
      align-items: center;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      font-weight: 500;
      white-space: nowrap;
    }
    .pill-approved { background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.22); color: var(--green); }
    .pill-blocked  { background: rgba(239,68,68,0.12);  border: 1px solid rgba(239,68,68,0.22);  color: var(--red);   }
    .pill-pending  { background: rgba(245,158,11,0.12); border: 1px solid rgba(245,158,11,0.22); color: var(--amber); }
    .pill-active   { background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.22); color: var(--green); }

    /* ── ACTIVITY TABLE ── */
    .activity-table { width: 100%; border-collapse: collapse; }
    .activity-th {
      text-align: left;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--dim);
      padding-bottom: 10px;
      font-weight: 400;
      border-bottom: 1px solid var(--border);
    }
    .activity-th.right { text-align: right; }
    .activity-row {
      border-bottom: 1px solid var(--border);
      animation: slide-in 0.2s ease;
    }
    @keyframes slide-in {
      from { opacity: 0; transform: translateY(-3px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .activity-row.pending-row {
      border-left: 3px solid var(--amber);
      background: rgba(245,158,11,0.03);
      animation: slide-in 0.2s ease, pulse-border 2s ease-in-out infinite;
    }
    @keyframes pulse-border {
      0%,100% { border-left-color: rgba(245,158,11,0.35); }
      50%      { border-left-color: rgba(245,158,11,1); }
    }
    .activity-row td { padding: 13px 10px; vertical-align: top; }
    .activity-row td:first-child { padding-left: 2px; }
    .a-url   { font-family: var(--mono); font-size: 12px; color: var(--text); }
    .a-amt   { font-family: var(--mono); font-size: 12px; text-align: right; white-space: nowrap; }
    .a-time  { font-family: var(--mono); font-size: 11px; color: var(--muted); text-align: right; white-space: nowrap; }
    .a-sig   { font-family: var(--mono); font-size: 11px; color: var(--dim); margin-top: 3px; }
    .pending-expand {
      padding-top: 12px;
      border-top: 1px solid rgba(245,158,11,0.12);
      margin-top: 10px;
    }
    .pending-detail { font-size: 12px; font-family: var(--mono); color: var(--muted); margin-bottom: 10px; line-height: 1.6; }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.13s;
      border: none;
      padding: 8px 20px;
      font-family: inherit;
    }
    .btn-primary  { background: var(--blue);  color: #fff; }
    .btn-primary:hover  { background: #2563eb; }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-outline  { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-outline:hover  { border-color: rgba(255,255,255,0.18); }
    .btn-approve  { background: rgba(16,185,129,0.14); border: 1px solid rgba(16,185,129,0.28); color: var(--green); padding: 5px 14px; font-size: 12px; }
    .btn-approve:hover  { background: rgba(16,185,129,0.24); }
    .btn-approve:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-deny     { background: transparent; border: 1px solid rgba(239,68,68,0.28); color: var(--red); padding: 5px 14px; font-size: 12px; }
    .btn-deny:hover     { background: rgba(239,68,68,0.08); }

    /* ── INPUTS ── */
    .form-group { margin-bottom: 18px; }
    .form-group:last-child { margin-bottom: 0; }
    .form-label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .form-input, .form-textarea {
      width: 100%;
      background: #161626;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 13px;
      padding: 9px 12px;
      outline: none;
      transition: border-color 0.13s, box-shadow 0.13s;
      font-family: var(--mono);
    }
    .form-input::placeholder, .form-textarea::placeholder { color: var(--dim); }
    .form-input:focus, .form-textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
    }
    .form-textarea { resize: vertical; min-height: 76px; line-height: 1.55; }
    .form-hint { font-size: 11px; color: var(--dim); margin-top: 4px; }
    .form-section {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--dim);
      margin: 24px 0 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .form-section:first-of-type { margin-top: 8px; }

    /* ── SECTION HEADER ── */
    .sec-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .sec-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }

    /* ── KEY STATUS ROWS ── */
    .ks-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .ks-row:last-child { border-bottom: none; }
    .ks-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.09em; color: var(--muted); }
    .ks-val   { font-size: 12px; font-family: var(--mono); color: var(--text); display: flex; align-items: center; gap: 8px; }

    /* ── COPY BTN ── */
    .copy-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--muted);
      font-size: 11px;
      padding: 2px 8px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.13s;
    }
    .copy-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
    .copy-btn.copied { border-color: rgba(16,185,129,0.3); color: var(--green); }

    /* ── EMPTY STATE ── */
    .empty { text-align: center; padding: 52px 24px; color: var(--muted); }
    .empty svg { margin: 0 auto 18px; display: block; opacity: 0.25; }
    .empty p { font-size: 13px; }

    /* ── ALERT BANNER ── */
    .alert-banner {
      background: rgba(245,158,11,0.07);
      border: 1px solid rgba(245,158,11,0.2);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--amber);
    }

    /* ── MISC ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
    .mono { font-family: var(--mono); }
    hr.div { border: none; border-top: 1px solid var(--border); margin: 18px 0; }

    /* ── SPINNER ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 13px; height: 13px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    /* ── SUCCESS/ERROR TOASTS ── */
    .toast-ok  { padding: 10px 14px; background: rgba(16,185,129,0.08);  border: 1px solid rgba(16,185,129,0.2);  border-radius: 8px; font-size: 12px; color: var(--green); font-family: var(--mono); margin-bottom: 14px; }
    .toast-err { padding: 10px 14px; background: rgba(239,68,68,0.08);   border: 1px solid rgba(239,68,68,0.2);   border-radius: 8px; font-size: 12px; color: var(--red);   font-family: var(--mono); margin-bottom: 14px; }
  </style>
</head>
<body>
  <div id="root"><p style="color:#666;padding:20px;font-family:monospace;">Initializing...</p></div>

  <script>
    window.onerror = function(msg, src, line, col, err) {
      document.getElementById('root').innerHTML =
        '<pre style="color:#ef4444;padding:20px;font-size:12px;white-space:pre-wrap;">' +
        'ERROR: ' + msg + '\nAt: ' + src + ':' + line + '\n' + (err ? err.stack : '') +
        '</pre>';
    };
    try {
      window._ipc = require('electron').ipcRenderer;
    } catch(e) {
      window._ipc = { invoke: async (ch, ...a) => { console.warn('IPC mock:', ch, a); return null; } };
    }
    window.React    = require('react');
    window.ReactDOM = require('react-dom/client');
  </script>
  <script src="node_modules/babel-standalone/babel.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;
    const ipc = window._ipc;

    // ── ICONS (dot-and-line SVG) ───────────────────────────────────────────────
    const IconOverview = () => (
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
        {[2,7,12].flatMap(x => [2,7,12].map(y =>
          <circle key={`${x}-${y}`} cx={x} cy={y} r="1.5" fill="currentColor"/>
        ))}
      </svg>
    );
    const IconActivity = () => (
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" strokeWidth="1">
        <circle cx="2" cy="10" r="1.5" fill="currentColor" stroke="none"/>
        <circle cx="7"  cy="5"  r="1.5" fill="currentColor" stroke="none"/>
        <circle cx="13" cy="10" r="1.5" fill="currentColor" stroke="none"/>
        <line x1="3.5" y1="10" x2="5.5" y2="5"/>
        <line x1="8.5" y1="5"  x2="11.5" y2="10"/>
      </svg>
    );
    const IconPolicy = () => (
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" strokeWidth="1">
        <circle cx="7.5" cy="2"  r="1.5" fill="currentColor" stroke="none"/>
        <circle cx="2"   cy="13" r="1.5" fill="currentColor" stroke="none"/>
        <circle cx="13"  cy="13" r="1.5" fill="currentColor" stroke="none"/>
        <line x1="7.5" y1="3.5" x2="2"   y2="11.5"/>
        <line x1="7.5" y1="3.5" x2="13"  y2="11.5"/>
        <line x1="2"   y1="13"  x2="13"  y2="13"/>
      </svg>
    );
    const IconWallet = () => (
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" strokeWidth="1">
        <circle cx="7.5" cy="7.5" r="1.5" fill="currentColor" stroke="none"/>
        <circle cx="7.5" cy="1.5" r="1.5" fill="currentColor" stroke="none"/>
        <circle cx="7.5" cy="13.5" r="1.5" fill="currentColor" stroke="none"/>
        <circle cx="1.5" cy="7.5" r="1.5" fill="currentColor" stroke="none"/>
        <circle cx="13.5" cy="7.5" r="1.5" fill="currentColor" stroke="none"/>
        <line x1="7.5" y1="3" x2="7.5" y2="6"/>
        <line x1="7.5" y1="9" x2="7.5" y2="12"/>
        <line x1="3"   y1="7.5" x2="6" y2="7.5"/>
        <line x1="9"   y1="7.5" x2="12" y2="7.5"/>
      </svg>
    );

    // ── HELPERS ───────────────────────────────────────────────────────────────
    const StatusPill = ({ status }) => {
      const cls = status === 'APPROVED' ? 'pill-approved'
                : status === 'BLOCKED'  ? 'pill-blocked'
                :                         'pill-pending';
      return <span className={`pill ${cls}`}>{status}</span>;
    };

    const CopyButton = ({ value }) => {
      const [copied, setCopied] = useState(false);
      return (
        <button className={`copy-btn ${copied ? 'copied' : ''}`}
          onClick={() => { navigator.clipboard.writeText(value); setCopied(true); setTimeout(() => setCopied(false), 1500); }}>
          {copied ? '✓ copied' : 'copy'}
        </button>
      );
    };

    const BudgetBar = ({ label, spent, total }) => {
      const pct = total > 0 ? Math.min(100, (spent / total) * 100) : 0;
      const cls = pct > 90 ? 'danger' : pct > 70 ? 'warn' : '';
      return (
        <div className="budget-row">
          <div className="budget-hdr">
            <span className="budget-name">{label}</span>
            <span className="budget-nums">
              <span className="mono">${spent.toFixed(2)}</span>
              <span style={{color:'#44445a'}}> / </span>
              <span className="mono">${total.toFixed(2)}</span>
            </span>
          </div>
          <div className="budget-track">
            <div className={`budget-fill ${cls}`} style={{width:`${pct}%`}}/>
          </div>
        </div>
      );
    };

    const EmptyState = ({ message }) => (
      <div className="empty">
        <svg width="44" height="44" viewBox="0 0 44 44" fill="none" stroke="#44445a" strokeWidth="1">
          <circle cx="22" cy="22" r="1.5" fill="#44445a" stroke="none"/>
          <circle cx="8"  cy="22" r="1.5" fill="#44445a" stroke="none"/>
          <circle cx="36" cy="22" r="1.5" fill="#44445a" stroke="none"/>
          <circle cx="22" cy="8"  r="1.5" fill="#44445a" stroke="none"/>
          <circle cx="22" cy="36" r="1.5" fill="#44445a" stroke="none"/>
          <line x1="9.5"  y1="22" x2="20.5" y2="22"/>
          <line x1="23.5" y1="22" x2="34.5" y2="22"/>
          <line x1="22" y1="9.5"  x2="22" y2="20.5"/>
          <line x1="22" y1="23.5" x2="22" y2="34.5"/>
        </svg>
        <p>{message}</p>
      </div>
    );

    // ── OVERVIEW TAB ──────────────────────────────────────────────────────────
    const OverviewTab = ({ stats, walletStatus, pendingCount }) => (
      <div>
        {pendingCount > 0 && (
          <div className="alert-banner">
            <span>⚠</span>
            <span>{pendingCount} transaction{pendingCount > 1 ? 's' : ''} awaiting your approval — go to Activity</span>
          </div>
        )}
        <div className="grid-4" style={{marginBottom:'16px'}}>
          <div className="card">
            <div className="stat-label">Spent Today</div>
            <div className="stat-value">${stats ? stats.spentTodayUSDC.toFixed(2) : '0.00'}</div>
            <div className="stat-sub">of ${stats ? stats.dailyBudgetUSDC.toFixed(2) : '—'} limit</div>
          </div>
          <div className="card">
            <div className="stat-label">Transactions</div>
            <div className="stat-value">{stats ? stats.transactionCount : 0}</div>
            <div className="stat-sub">total approved</div>
          </div>
          <div className="card">
            <div className="stat-label">Daily Remaining</div>
            <div className="stat-value">${stats ? stats.dailyRemaining.toFixed(2) : '—'}</div>
            <div className="stat-sub">USDC available</div>
          </div>
          <div className="card">
            <div className="stat-label">Agent Status</div>
            <div className="stat-value" style={{fontSize:'16px', fontFamily:'inherit', marginTop:'8px'}}>
              {walletStatus && walletStatus.provisioned
                ? <span style={{color:'var(--green)'}}>Active</span>
                : <span style={{color:'var(--dim)'}}>Not Provisioned</span>}
            </div>
            <div className="stat-sub" style={{wordBreak:'break-all'}}>
              {walletStatus && walletStatus.publicKey
                ? walletStatus.publicKey.slice(0,8) + '…' + walletStatus.publicKey.slice(-4)
                : 'go to Wallet tab'}
            </div>
          </div>
        </div>

        <div className="card">
          <div className="sec-hdr"><span className="sec-title">Budget Utilization</span></div>
          {stats
            ? <div>
                <BudgetBar label="Daily"   spent={stats.spentTodayUSDC} total={stats.dailyBudgetUSDC}/>
                <BudgetBar label="Weekly"  spent={stats.spentWeekUSDC}  total={stats.weeklyBudgetUSDC}/>
                <BudgetBar label="Monthly" spent={stats.spentMonthUSDC} total={stats.monthlyBudgetUSDC}/>
              </div>
            : <EmptyState message="Provision a wallet and the budget tracker will appear here."/>}
        </div>
      </div>
    );

    // ── ACTIVITY TAB ──────────────────────────────────────────────────────────
    const ActivityTab = ({ activity, pending, onApprove, onDeny }) => {
      const [processing, setProcessing] = useState({});

      const approve = async (id) => {
        setProcessing(p => ({...p, [id]: 'approving'}));
        await onApprove(id);
        setProcessing(p => ({...p, [id]: null}));
      };
      const deny = async (id) => {
        setProcessing(p => ({...p, [id]: 'denying'}));
        await onDeny(id);
        setProcessing(p => ({...p, [id]: null}));
      };

      const fmt = ts => new Date(ts).toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit', second:'2-digit'});

      const pendingRows = (pending || []).map(p => ({...p, _pending: true}));
      const resolvedRows = (activity || []).filter(a => a.status !== 'PENDING')
        .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
      const allRows = [...pendingRows, ...resolvedRows].slice(0, 60);

      if (allRows.length === 0) {
        return (
          <div className="card">
            <EmptyState message="No activity yet. Requests from the agent will appear here in real time."/>
          </div>
        );
      }

      return (
        <div className="card">
          <div className="sec-hdr">
            <span className="sec-title">Transaction Log</span>
            <span style={{fontSize:'11px', color:'var(--dim)', fontFamily:'monospace'}}>{allRows.length} entries</span>
          </div>
          <table className="activity-table">
            <thead>
              <tr>
                <th className="activity-th">Status</th>
                <th className="activity-th">Endpoint</th>
                <th className="activity-th right">Amount</th>
                <th className="activity-th right">Time</th>
              </tr>
            </thead>
            <tbody>
              {allRows.map((row, i) => (
                <tr key={row.id || i} className={`activity-row ${row._pending ? 'pending-row' : ''}`}>
                  <td style={{paddingTop: row._pending ? '14px' : undefined}}>
                    <StatusPill status={row._pending ? 'PENDING' : row.status}/>
                  </td>
                  <td>
                    <div className="a-url">{row.url || '—'}</div>
                    {row._pending && (
                      <div className="pending-expand">
                        <div className="pending-detail">
                          Amount: <span style={{color:'var(--amber)'}}>${parseFloat(row.amount||0).toFixed(2)} USDC</span><br/>
                          To: {row.recipient || '—'}
                        </div>
                        <div style={{display:'flex', gap:'8px'}}>
                          <button className="btn btn-approve" disabled={!!processing[row.id]}
                            onClick={() => approve(row.id)}>
                            {processing[row.id] === 'approving' ? <span className="spinner"/> : 'Approve'}
                          </button>
                          <button className="btn btn-deny" disabled={!!processing[row.id]}
                            onClick={() => deny(row.id)}>
                            Deny
                          </button>
                        </div>
                      </div>
                    )}
                    {row.signature && (
                      <div className="a-sig">tx: {row.signature.slice(0,14)}…</div>
                    )}
                  </td>
                  <td className="a-amt" style={{color: row._pending ? 'var(--amber)' : undefined}}>
                    ${parseFloat(row.amount||0).toFixed(2)}
                  </td>
                  <td className="a-time">{fmt(row.timestamp)}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    };

    // ── POLICY TAB ────────────────────────────────────────────────────────────
    const PolicyTab = ({ config, onSave }) => {
      const arrStr = a => (a || []).join('\n');
      const toArr  = s => s.split('\n').map(x => x.trim()).filter(Boolean);

      const [f, setF] = useState({
        dailyBudget:'2.00', weeklyBudget:'10.00', monthlyBudget:'50.00',
        perTxLimit:'0.50', autoApproveThreshold:'1.00',
        allowedTokenMints:'', blockedTokenMints:'',
        whitelistedURLs:'localhost:9090', blacklistedURLs:'',
        whitelistedAddresses:'', blacklistedAddresses:'',
        whitelistedProgramIDs:'', blacklistedProgramIDs:'',
        keywordBlocklist:'', forbiddenActions:'', priorityInstructions:''
      });
      const [saving, setSaving] = useState(false);
      const [saved, setSaved]   = useState(false);

      useEffect(() => {
        if (!config) return;
        setF({
          dailyBudget:          String(config.dailyBudgetUSDC          || 2),
          weeklyBudget:         String(config.weeklyBudgetUSDC         || 10),
          monthlyBudget:        String(config.monthlyBudgetUSDC        || 50),
          perTxLimit:           String(config.perTransactionLimitUSDC  || 0.5),
          autoApproveThreshold: String(config.autoApproveThresholdUSDC || 1),
          allowedTokenMints:    arrStr(config.allowedTokenMints),
          blockedTokenMints:    arrStr(config.blockedTokenMints),
          whitelistedURLs:      arrStr(config.whitelistedURLs),
          blacklistedURLs:      arrStr(config.blacklistedURLs),
          whitelistedAddresses: arrStr(config.whitelistedAddresses),
          blacklistedAddresses: arrStr(config.blacklistedAddresses),
          whitelistedProgramIDs:arrStr(config.whitelistedProgramIDs),
          blacklistedProgramIDs:arrStr(config.blacklistedProgramIDs),
          keywordBlocklist:     arrStr(config.keywordBlocklist),
          forbiddenActions:     arrStr(config.forbiddenActions),
          priorityInstructions: config.priorityInstructions || ''
        });
      }, [config]);

      const set = k => e => setF(p => ({...p, [k]: e.target.value}));

      const save = async () => {
        setSaving(true);
        await onSave({
          dailyBudget:          parseFloat(f.dailyBudget)          || 2,
          weeklyBudget:         parseFloat(f.weeklyBudget)         || 10,
          monthlyBudget:        parseFloat(f.monthlyBudget)        || 50,
          perTxLimit:           parseFloat(f.perTxLimit)           || 0.5,
          autoApproveThreshold: parseFloat(f.autoApproveThreshold) || 1,
          allowedTokenMints:    toArr(f.allowedTokenMints),
          blockedTokenMints:    toArr(f.blockedTokenMints),
          whitelistedURLs:      toArr(f.whitelistedURLs),
          blacklistedURLs:      toArr(f.blacklistedURLs),
          whitelistedAddresses: toArr(f.whitelistedAddresses),
          blacklistedAddresses: toArr(f.blacklistedAddresses),
          whitelistedProgramIDs:toArr(f.whitelistedProgramIDs),
          blacklistedProgramIDs:toArr(f.blacklistedProgramIDs),
          keywordBlocklist:     toArr(f.keywordBlocklist),
          forbiddenActions:     toArr(f.forbiddenActions),
          priorityInstructions: f.priorityInstructions
        });
        setSaving(false); setSaved(true);
        setTimeout(() => setSaved(false), 2000);
      };

      const I = (key, type='text', placeholder='') => (
        <input className="form-input" type={type} step={type==='number'?'0.01':undefined}
          value={f[key]} onChange={set(key)} placeholder={placeholder}/>
      );
      const T = (key, placeholder='') => (
        <textarea className="form-textarea" value={f[key]} onChange={set(key)} placeholder={placeholder}/>
      );

      return (
        <div className="card">
          <div className="sec-hdr" style={{marginBottom:'4px'}}>
            <span className="sec-title">Agent Policy Rules</span>
            <button className="btn btn-primary" onClick={save} disabled={saving}>
              {saving ? <span className="spinner"/> : saved ? '✓ Saved' : 'Save Policy'}
            </button>
          </div>

          <p className="form-section">Spend Controls</p>
          <div className="grid-3">
            <div className="form-group"><label className="form-label">Daily Budget (USDC)</label>{I('dailyBudget','number')}</div>
            <div className="form-group"><label className="form-label">Weekly Budget (USDC)</label>{I('weeklyBudget','number')}</div>
            <div className="form-group"><label className="form-label">Monthly Budget (USDC)</label>{I('monthlyBudget','number')}</div>
          </div>
          <div className="grid-2">
            <div className="form-group"><label className="form-label">Per-Transaction Limit (USDC)</label>{I('perTxLimit','number')}</div>
            <div className="form-group">
              <label className="form-label">Auto-Approve Below (USDC)</label>
              {I('autoApproveThreshold','number')}
              <p className="form-hint">Transactions above this amount require manual approval.</p>
            </div>
          </div>

          <p className="form-section">URL Firewall</p>
          <div className="grid-2">
            <div className="form-group">
              <label className="form-label">Whitelisted URLs</label>
              {T('whitelistedURLs','localhost:9090\napi.trusted.com')}
              <p className="form-hint">One per line. Requests to unlisted URLs are blocked.</p>
            </div>
            <div className="form-group">
              <label className="form-label">Blacklisted URLs</label>
              {T('blacklistedURLs','casino.com\ndrain.io')}
              <p className="form-hint">Always blocked regardless of budget.</p>
            </div>
          </div>

          <p className="form-section">Address Controls</p>
          <div className="grid-2">
            <div className="form-group"><label className="form-label">Whitelisted Addresses</label>{T('whitelistedAddresses','SolanaAddress...')}</div>
            <div className="form-group"><label className="form-label">Blacklisted Addresses</label>{T('blacklistedAddresses','BadActorAddress...')}</div>
          </div>

          <p className="form-section">On-Chain Program Controls</p>
          <div className="grid-2">
            <div className="form-group"><label className="form-label">Whitelisted Program IDs</label>{T('whitelistedProgramIDs','ProgramID...')}</div>
            <div className="form-group">
              <label className="form-label">Blacklisted Program IDs</label>
              {T('blacklistedProgramIDs','BadProgramID...')}
              <p className="form-hint">Blocks agent from interacting with unapproved protocols.</p>
            </div>
          </div>

          <p className="form-section">Behavioral Guardrails</p>
          <div className="grid-2">
            <div className="form-group">
              <label className="form-label">Keyword Blocklist</label>
              {T('keywordBlocklist','drain\ncasino\nmeme')}
              <p className="form-hint">Requests containing these words are blocked.</p>
            </div>
            <div className="form-group"><label className="form-label">Forbidden Actions</label>{T('forbiddenActions','swap on unapproved DEX')}</div>
          </div>
          <div className="form-group">
            <label className="form-label">Priority Instructions</label>
            {T('priorityInstructions','Never interact with meme tokens. Only use approved DEXes.')}
            <p className="form-hint">Free-text rules the agent must always respect.</p>
          </div>

          <p className="form-section">Token Restrictions</p>
          <div className="grid-2">
            <div className="form-group"><label className="form-label">Allowed Token Mints</label>{T('allowedTokenMints','Leave empty to allow all')}</div>
            <div className="form-group"><label className="form-label">Blocked Token Mints</label>{T('blockedTokenMints','MintAddress...')}</div>
          </div>
        </div>
      );
    };

    // ── WALLET TAB ────────────────────────────────────────────────────────────
    const WalletTab = ({ walletStatus, onProvision }) => {
      const [prov, setProv]           = useState(false);
      const [result, setResult]       = useState(null);
      const [solBal, setSolBal]       = useState(null);
      const [airdropping, setAirdrop] = useState(false);
      const [airdropMsg, setAirdropMsg] = useState(null);

      useEffect(() => {
        if (walletStatus && walletStatus.provisioned) {
          ipc.invoke('get-sol-balance').then(r => r && setSolBal(r.balance));
          const t = setInterval(() => {
            ipc.invoke('get-sol-balance').then(r => r && setSolBal(r.balance));
          }, 5000);
          return () => clearInterval(t);
        }
      }, [walletStatus && walletStatus.provisioned]);

      const doAirdrop = async () => {
        setAirdrop(true); setAirdropMsg(null);
        try {
          const r = await ipc.invoke('airdrop-sol');
          setAirdropMsg({ ok: true, text: '1 SOL airdropped to your wallet.' });
          ipc.invoke('get-sol-balance').then(r => r && setSolBal(r.balance));
        } catch(e) {
          setAirdropMsg({ ok: false, text: e.message || 'Airdrop failed — try again.' });
        }
        setAirdrop(false);
      };

      const openFaucet = () => {
        require('electron').shell.openExternal('https://spl-token-faucet.com/?token-name=USDC-Dev');
      };
      const [p, setP] = useState({
        dailyBudget:'2.00', weeklyBudget:'10.00', monthlyBudget:'50.00',
        perTxLimit:'0.50', autoApproveThreshold:'1.00', whitelistedURLs:'localhost:9090'
      });
      const set = k => e => setP(x => ({...x, [k]: e.target.value}));

      const provision = async () => {
        setProv(true); setResult(null);
        try {
          const r = await onProvision({
            dailyBudget:          parseFloat(p.dailyBudget),
            weeklyBudget:         parseFloat(p.weeklyBudget),
            monthlyBudget:        parseFloat(p.monthlyBudget),
            perTxLimit:           parseFloat(p.perTxLimit),
            autoApproveThreshold: parseFloat(p.autoApproveThreshold),
            whitelistedURLs: p.whitelistedURLs.split('\n').map(s=>s.trim()).filter(Boolean)
          });
          setResult(r);
        } catch(e) { setResult({error: e.message}); }
        setProv(false);
      };

      const exportRecovery = async () => {
        const r = await ipc.invoke('export-recovery');
        if (r) alert(`Share 3 (Recovery)\n\nSave this offline — needed if OS keychain and encrypted file are both lost:\n\n${r.share3}`);
      };

      if (walletStatus && walletStatus.provisioned) {
        return (
          <div>
            <div className="card">
              <div className="sec-hdr">
                <span className="sec-title">Wallet Status</span>
                <span className="pill pill-active">Active</span>
              </div>
              <div className="ks-row">
                <span className="ks-label">Public Key</span>
                <span className="ks-val">
                  <span className="mono" style={{fontSize:'11px'}}>{walletStatus.publicKey}</span>
                  <CopyButton value={walletStatus.publicKey}/>
                </span>
              </div>
              <div className="ks-row">
                <span className="ks-label">Share 1</span>
                <span className="ks-val" style={{color:'var(--green)'}}>● OS Credential Manager (keytar)</span>
              </div>
              <div className="ks-row">
                <span className="ks-label">Share 2</span>
                <span className="ks-val" style={{color:'var(--green)'}}>● AES-256 Encrypted File (~/.aegis/share2.enc)</span>
              </div>
              <div className="ks-row">
                <span className="ks-label">Share 3</span>
                <span className="ks-val" style={{color: walletStatus.recoveryExists ? 'var(--amber)' : 'var(--dim)'}}>
                  {walletStatus.recoveryExists ? '● Offline Recovery Export' : '○ Not exported'}
                </span>
              </div>
              <div className="ks-row">
                <span className="ks-label">Threshold</span>
                <span className="ks-val">2-of-3 shares required to reconstruct</span>
              </div>
            </div>

            <div className="card">
              <div className="sec-hdr">
                <span className="sec-title">Devnet Funds</span>
                {solBal !== null && (
                  <span style={{fontSize:'12px', fontFamily:'monospace', color:'var(--muted)'}}>
                    Balance: <span style={{color:'var(--text)'}}>{solBal.toFixed(4)} SOL</span>
                  </span>
                )}
              </div>
              <p style={{fontSize:'13px', color:'var(--muted)', marginBottom:'16px', lineHeight:'1.6'}}>
                Your wallet needs SOL to pay Solana transaction fees, and Devnet USDC to make payments.
              </p>
              {airdropMsg && (
                <div className={airdropMsg.ok ? 'toast-ok' : 'toast-err'} style={{marginBottom:'12px'}}>
                  {airdropMsg.ok ? '✓ ' : '✗ '}{airdropMsg.text}
                </div>
              )}
              <div style={{display:'flex', gap:'10px', flexWrap:'wrap'}}>
                <button className="btn btn-primary" onClick={doAirdrop} disabled={airdropping}>
                  {airdropping ? <span><span className="spinner"/> Airdropping…</span> : 'Airdrop 1 SOL (Devnet)'}
                </button>
                <button className="btn btn-outline" onClick={openFaucet}>
                  Get Devnet USDC ↗
                </button>
              </div>
            </div>

            <div className="card">
              <div className="sec-hdr"><span className="sec-title">Recovery</span></div>
              <p style={{fontSize:'13px', color:'var(--muted)', marginBottom:'16px', lineHeight:'1.6'}}>
                Share 3 is your offline recovery key. Store it somewhere safe and separate from this machine.
                You need any 2 of 3 shares to reconstruct the private key.
              </p>
              <button className="btn btn-outline" onClick={exportRecovery}>Export Recovery Share</button>
            </div>
          </div>
        );
      }

      return (
        <div className="card">
          <div className="sec-hdr"><span className="sec-title">Provision Agent Wallet</span></div>
          <p style={{fontSize:'13px', color:'var(--muted)', marginBottom:'20px', lineHeight:'1.6'}}>
            Generate a new Solana keypair and distribute the signing key across two secure backends
            using Shamir's Secret Sharing (2-of-3). Configure initial policy rules below.
          </p>

          <div className="grid-3">
            <div className="form-group"><label className="form-label">Daily Budget (USDC)</label>
              <input className="form-input" type="number" step="0.01" value={p.dailyBudget} onChange={set('dailyBudget')}/></div>
            <div className="form-group"><label className="form-label">Weekly Budget (USDC)</label>
              <input className="form-input" type="number" step="0.01" value={p.weeklyBudget} onChange={set('weeklyBudget')}/></div>
            <div className="form-group"><label className="form-label">Monthly Budget (USDC)</label>
              <input className="form-input" type="number" step="0.01" value={p.monthlyBudget} onChange={set('monthlyBudget')}/></div>
          </div>
          <div className="grid-2">
            <div className="form-group"><label className="form-label">Per-Transaction Limit (USDC)</label>
              <input className="form-input" type="number" step="0.01" value={p.perTxLimit} onChange={set('perTxLimit')}/></div>
            <div className="form-group">
              <label className="form-label">Auto-Approve Below (USDC)</label>
              <input className="form-input" type="number" step="0.01" value={p.autoApproveThreshold} onChange={set('autoApproveThreshold')}/>
              <p className="form-hint">Transactions above this pause and require your approval.</p>
            </div>
          </div>
          <div className="form-group">
            <label className="form-label">Whitelisted URLs (one per line)</label>
            <textarea className="form-textarea" value={p.whitelistedURLs} onChange={set('whitelistedURLs')} placeholder="localhost:9090"/>
          </div>

          {result && result.error   && <div className="toast-err">✗ {result.error}</div>}
          {result && result.publicKey && <div className="toast-ok">✓ Wallet provisioned — {result.publicKey}</div>}

          <button className="btn btn-primary" onClick={provision} disabled={prov}>
            {prov ? <span><span className="spinner"/> Provisioning…</span> : 'Provision Agent Wallet'}
          </button>
        </div>
      );
    };

    // ── APP ROOT ──────────────────────────────────────────────────────────────
    function App() {
      const [tab, setTab]               = useState('overview');
      const [walletStatus, setWS]       = useState(null);
      const [config, setConfig]         = useState(null);
      const [stats, setStats]           = useState(null);
      const [activity, setActivity]     = useState([]);
      const [pending, setPending]       = useState([]);

      const refresh = useCallback(async () => {
        try {
          const [ws, cfg, sp, act, pnd] = await Promise.all([
            ipc.invoke('get-wallet-status'),
            ipc.invoke('get-config'),
            ipc.invoke('get-spend-stats'),
            ipc.invoke('get-activity'),
            ipc.invoke('get-pending')
          ]);
          if (ws)  setWS(ws);
          if (cfg) setConfig(cfg);
          if (sp)  setStats(sp);
          setActivity(act || []);
          setPending(pnd || []);
        } catch(e) { console.error('Refresh:', e); }
      }, []);

      useEffect(() => { refresh(); const t = setInterval(refresh, 2000); return () => clearInterval(t); }, [refresh]);

      const handleProvision  = async (policy) => { const r = await ipc.invoke('provision-wallet', policy); await refresh(); return r; };
      const handleSavePolicy = async (policy) => { await ipc.invoke('save-policy', policy); await refresh(); };
      const handleApprove    = async (id)     => { await ipc.invoke('approve-transaction', id); await refresh(); };
      const handleDeny       = async (id)     => { await ipc.invoke('deny-transaction', id);    await refresh(); };

      const shortKey = walletStatus && walletStatus.publicKey
        ? walletStatus.publicKey.slice(0,6) + '…' + walletStatus.publicKey.slice(-4)
        : 'No wallet';

      const tabs = [
        { id:'overview', label:'Overview',  Icon: IconOverview,  group:'Monitor' },
        { id:'activity', label:'Activity',  Icon: IconActivity,  group:'Monitor',  badge: pending.length || null },
        { id:'policy',   label:'Policy',    Icon: IconPolicy,    group:'Configure' },
        { id:'wallet',   label:'Wallet',    Icon: IconWallet,    group:'Configure' },
      ];

      return (
        <div style={{display:'flex', height:'100vh', overflow:'hidden'}}>

          {/* SIDEBAR */}
          <div className="sidebar">
            <div className="sidebar-logo">
              <div className="sidebar-logo-text">AEGIS</div>
              <div className="sidebar-logo-sub">Agent Gateway</div>
            </div>

            {['Monitor','Configure'].map(group => (
              <div key={group}>
                <div className="nav-section-label">{group}</div>
                {tabs.filter(t => t.group === group).map(({ id, label, Icon, badge }) => (
                  <div key={id} className={`nav-item ${tab===id?'active':''}`} onClick={() => setTab(id)}>
                    <Icon/>
                    <span>{label}</span>
                    {badge && <span className="nav-badge">{badge}</span>}
                  </div>
                ))}
              </div>
            ))}

            <div className="agent-status-block">
              <div className="status-row">
                <div className={`status-dot ${walletStatus && walletStatus.provisioned ? '' : 'offline'}`}/>
                <span>{walletStatus && walletStatus.provisioned ? 'Agent Active' : 'Not Provisioned'}</span>
              </div>
              <div className="status-key">{shortKey}</div>
            </div>
          </div>

          {/* MAIN */}
          <div className="main">
            <div className="topbar">
              <span className="topbar-title">
                {tab==='overview' ? 'Overview' : tab==='activity' ? 'Transaction Activity' : tab==='policy' ? 'Policy Rules' : 'Wallet & Key Management'}
              </span>
              <div style={{display:'flex', alignItems:'center', gap:'16px'}}>
                {walletStatus && walletStatus.publicKey && (
                  <span style={{fontSize:'11px', fontFamily:'monospace', color:'var(--dim)'}}>
                    {walletStatus.publicKey.slice(0,6)}…{walletStatus.publicKey.slice(-4)}
                  </span>
                )}
                <span className={`topbar-status ${pending.length ? 'topbar-warn' : ''}`}>
                  {pending.length > 0
                    ? `⚠ ${pending.length} pending approval${pending.length>1?'s':''}`
                    : 'All systems normal'}
                </span>
              </div>
            </div>

            <div className="content">
              {tab==='overview' && <OverviewTab stats={stats} walletStatus={walletStatus} pendingCount={pending.length}/>}
              {tab==='activity' && <ActivityTab activity={activity} pending={pending} onApprove={handleApprove} onDeny={handleDeny}/>}
              {tab==='policy'   && <PolicyTab   config={config}   onSave={handleSavePolicy}/>}
              {tab==='wallet'   && <WalletTab   walletStatus={walletStatus} onProvision={handleProvision}/>}
            </div>
          </div>

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
