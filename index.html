<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Aegis</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0a0a12;
      --card:    #12121e;
      --sidebar: #0e0e1a;
      --border:  rgba(255,255,255,0.07);
      --blue:    #3b82f6;
      --green:   #10b981;
      --red:     #ef4444;
      --amber:   #f59e0b;
      --text:    #e2e8f0;
      --muted:   #64748b;
      --dim:     #44445a;
      --mono:    'SF Mono', 'Fira Code', Consolas, monospace;
      --dot-bg:  radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px) 24px 24px;
      --transition-tab: 160ms ease-out;
    }

    html, body, #root { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      overflow: hidden;
      display: flex;
    }

    /* ── SIDEBAR ─────────────────────────────────────── */
    .sidebar {
      width: 210px;
      min-width: 210px;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }
    .sidebar-logo {
      padding: 24px 20px 22px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-logo-mark {
      display: flex;
      align-items: center;
      gap: 9px;
    }
    .sidebar-logo-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, rgba(59,130,246,0.25) 0%, rgba(59,130,246,0.08) 100%);
      border: 1px solid rgba(59,130,246,0.25);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .sidebar-logo-text {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.14em;
      color: #fff;
    }
    .sidebar-logo-sub {
      font-size: 10px;
      color: var(--dim);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 6px;
    }
    .nav-section-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--dim);
      padding: 20px 20px 7px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 20px;
      cursor: pointer;
      color: var(--muted);
      font-size: 13px;
      border-left: 2px solid transparent;
      transition: color 0.12s, background 0.12s, border-color 0.12s;
      user-select: none;
    }
    .nav-item:hover {
      color: var(--text);
      background: rgba(255,255,255,0.03);
    }
    .nav-item.active {
      color: var(--blue);
      border-left-color: var(--blue);
      background: rgba(59,130,246,0.07);
    }
    .nav-badge {
      margin-left: auto;
      background: rgba(245,158,11,0.2);
      color: var(--amber);
      border-radius: 999px;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      animation: badge-pulse 2s ease-in-out infinite;
    }
    @keyframes badge-pulse {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.6; }
    }
    .agent-status-block {
      margin-top: auto;
      padding: 14px 20px;
      border-top: 1px solid var(--border);
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
      animation: pulse-green 2.5s ease-in-out infinite;
    }
    .status-dot.offline { background: var(--dim); animation: none; }
    @keyframes pulse-green {
      0%,100% { box-shadow: 0 0 0 0 rgba(16,185,129,0.5); }
      50%      { box-shadow: 0 0 0 5px rgba(16,185,129,0); }
    }
    .status-key {
      margin-top: 5px;
      font-size: 10px;
      color: var(--dim);
      font-family: var(--mono);
      word-break: break-all;
      line-height: 1.4;
    }

    /* ── MAIN ─────────────────────────────────────────── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

    .topbar {
      padding: 0 28px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--sidebar);
      flex-shrink: 0;
      height: 52px;
      transition: background 0.3s, border-color 0.3s;
    }
    .topbar.pending-state {
      background: rgba(245,158,11,0.06);
      border-bottom-color: rgba(245,158,11,0.25);
    }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .topbar-title { font-size: 13px; font-weight: 500; color: var(--text); }
    .topbar-right { display: flex; align-items: center; gap: 16px; }
    .topbar-wallet {
      font-size: 11px;
      font-family: var(--mono);
      color: var(--dim);
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
    }
    .topbar-status { font-size: 11px; font-family: var(--mono); color: var(--muted); }
    .topbar-warn {
      color: var(--amber);
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 500;
    }
    .topbar-warn-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--amber);
      animation: pulse-amber-dot 1.5s ease-in-out infinite;
    }
    @keyframes pulse-amber-dot {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.3; }
    }

    /* ── CONTENT & TAB TRANSITIONS ────────────────────── */
    .content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 24px 28px 32px;
      width: 100%;
    }
    .tab-pane {
      animation: tab-enter 0.16s ease-out;
      width: 100%;
    }
    @keyframes tab-enter {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── CARDS ────────────────────────────────────────── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      width: 100%;
    }
    .card + .card { margin-top: 14px; }

    /* Hero card — dot grid + blue tint, only used for Spent Today */
    .card-hero {
      background: linear-gradient(135deg, #12121e 0%, rgba(59,130,246,0.05) 100%);
      background-image: var(--dot-bg);
      background-color: #12121e;
      border: 1px solid rgba(59,130,246,0.2);
      border-radius: 12px;
      padding: 24px;
    }

    /* Interactive card — hover feedback only on clickable cards */
    .card-interactive {
      transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
      cursor: default;
    }
    .card-interactive:hover {
      border-color: rgba(59,130,246,0.28);
      box-shadow: 0 4px 24px rgba(0,0,0,0.25);
    }

    /* Plain stat card — no hover */
    .card-stat {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
    }

    /* ── GRIDS ────────────────────────────────────────── */
    .grid-4 {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 14px;
      width: 100%;
    }
    .grid-3 {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 12px;
      width: 100%;
    }
    .grid-2 {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 12px;
      width: 100%;
    }

    /* ── STAT CARDS ───────────────────────────────────── */
    .stat-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .stat-value {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 28px;
      color: #fff;
      line-height: 1;
    }
    .stat-value-hero {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 44px;
      color: #fff;
      line-height: 1;
    }
    .stat-sub {
      margin-top: 8px;
      font-size: 11px;
      color: var(--muted);
      font-family: var(--mono);
    }
    .stat-hero-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(59,130,246,0.8);
      margin-bottom: 10px;
    }

    /* ── BUDGET BARS ──────────────────────────────────── */
    .budget-section { width: 100%; }
    .budget-row { margin-bottom: 16px; width: 100%; }
    .budget-row:last-child { margin-bottom: 0; }
    .budget-hdr {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 7px;
    }
    .budget-name {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--muted);
    }
    .budget-nums { font-size: 12px; font-family: var(--mono); color: var(--text); }
    .budget-track {
      height: 4px;
      background: rgba(255,255,255,0.06);
      border-radius: 999px;
      overflow: hidden;
      width: 100%;
    }
    .budget-fill {
      height: 100%;
      border-radius: 999px;
      background: var(--blue);
      transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
    }
    .budget-fill.warn   { background: var(--amber); }
    .budget-fill.danger { background: var(--red); }

    /* ── PILLS ────────────────────────────────────────── */
    .pill {
      display: inline-flex;
      align-items: center;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      font-weight: 500;
      white-space: nowrap;
    }
    .pill-approved { background: rgba(16,185,129,0.12);  border: 1px solid rgba(16,185,129,0.22); color: var(--green); }
    .pill-blocked  { background: rgba(239,68,68,0.12);   border: 1px solid rgba(239,68,68,0.22);  color: var(--red);   }
    .pill-pending  { background: rgba(245,158,11,0.12);  border: 1px solid rgba(245,158,11,0.22); color: var(--amber); }
    .pill-active   { background: rgba(16,185,129,0.12);  border: 1px solid rgba(16,185,129,0.22); color: var(--green); }

    /* ── ACTIVITY TABLE ───────────────────────────────── */
    .activity-table { width: 100%; border-collapse: collapse; }
    .activity-th {
      text-align: left;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--dim);
      padding: 0 10px 10px;
      font-weight: 400;
      border-bottom: 1px solid var(--border);
    }
    .activity-th:first-child { padding-left: 2px; }
    .activity-th.right { text-align: right; }
    .activity-row {
      border-bottom: 1px solid var(--border);
      transition: background 0.12s;
      animation: slide-in 0.18s ease-out;
    }
    .activity-row:hover { background: rgba(255,255,255,0.02); }
    @keyframes slide-in {
      from { opacity: 0; transform: translateY(-3px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .activity-row.pending-row {
      border-left: 3px solid var(--amber);
      background: rgba(245,158,11,0.03);
      animation: slide-in 0.18s ease-out, pulse-border 2s ease-in-out infinite;
    }
    .activity-row.pending-row:hover { background: rgba(245,158,11,0.06); }
    @keyframes pulse-border {
      0%,100% { border-left-color: rgba(245,158,11,0.3); }
      50%      { border-left-color: rgba(245,158,11,1); }
    }
    .activity-row td { padding: 13px 10px; vertical-align: top; }
    .activity-row td:first-child { padding-left: 2px; }
    .a-url  { font-family: var(--mono); font-size: 12px; color: var(--text); }
    .a-amt  { font-family: var(--mono); font-size: 12px; text-align: right; white-space: nowrap; }
    .a-time { font-family: var(--mono); font-size: 11px; color: var(--muted); text-align: right; white-space: nowrap; }
    .a-sig  { font-family: var(--mono); font-size: 11px; color: var(--dim); margin-top: 3px; }
    .pending-expand {
      padding-top: 12px;
      border-top: 1px solid rgba(245,158,11,0.12);
      margin-top: 10px;
    }
    .pending-detail {
      font-size: 12px;
      font-family: var(--mono);
      color: var(--muted);
      margin-bottom: 10px;
      line-height: 1.7;
    }

    /* ── BUTTONS ──────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.13s, border-color 0.13s, transform 0.1s, opacity 0.13s;
      border: none;
      padding: 9px 22px;
      font-family: inherit;
      user-select: none;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary  { background: var(--blue); color: #fff; }
    .btn-primary:hover  { background: #2563eb; }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
    .btn-outline  { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-outline:hover  { border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.03); }
    .btn-approve  { background: rgba(16,185,129,0.14); border: 1px solid rgba(16,185,129,0.28); color: var(--green); padding: 6px 16px; font-size: 12px; }
    .btn-approve:hover  { background: rgba(16,185,129,0.24); border-color: rgba(16,185,129,0.45); }
    .btn-approve:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
    .btn-deny     { background: transparent; border: 1px solid rgba(239,68,68,0.28); color: var(--red); padding: 6px 16px; font-size: 12px; }
    .btn-deny:hover     { background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.45); }

    /* ── INPUTS ───────────────────────────────────────── */
    .form-group { margin-bottom: 18px; width: 100%; }
    .form-group:last-child { margin-bottom: 0; }
    .form-label {
      display: block;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .form-input, .form-textarea {
      width: 100%;
      background: #0f0f1c;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 13px;
      padding: 9px 12px;
      outline: none;
      transition: border-color 0.13s, box-shadow 0.13s;
      font-family: var(--mono);
    }
    .form-input::placeholder, .form-textarea::placeholder { color: var(--dim); }
    .form-input:hover, .form-textarea:hover { border-color: rgba(255,255,255,0.14); }
    .form-input:focus, .form-textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
    }
    .form-textarea { resize: vertical; min-height: 76px; line-height: 1.55; }
    .form-hint { font-size: 11px; color: var(--dim); margin-top: 4px; line-height: 1.5; }

    /* ── ACCORDION (Policy sections) ─────────────────── */
    .accordion-section { border-bottom: 1px solid var(--border); }
    .accordion-section:last-child { border-bottom: none; }
    .accordion-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0;
      cursor: pointer;
      user-select: none;
      transition: color 0.12s;
    }
    .accordion-header:hover { color: var(--text); }
    .accordion-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      font-weight: 500;
    }
    .accordion-header:hover .accordion-title { color: var(--text); }
    .accordion-chevron {
      font-size: 10px;
      color: var(--dim);
      transition: transform 0.2s ease;
    }
    .accordion-chevron.open { transform: rotate(180deg); }
    .accordion-body {
      overflow: hidden;
      transition: max-height 0.25s ease, opacity 0.2s ease;
    }
    .accordion-body.closed { max-height: 0; opacity: 0; pointer-events: none; }
    .accordion-body.open   { max-height: 2000px; opacity: 1; }
    .accordion-content { padding-bottom: 20px; }

    /* ── SECTION HEADER ───────────────────────────────── */
    .sec-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
    .sec-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      font-weight: 500;
    }
    .sec-count { font-size: 11px; color: var(--dim); font-family: var(--mono); }

    /* ── KEY STATUS ROWS ──────────────────────────────── */
    .ks-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 0;
      border-bottom: 1px solid var(--border);
      transition: background 0.12s;
    }
    .ks-row:hover { background: rgba(255,255,255,0.01); }
    .ks-row:last-child { border-bottom: none; }
    .ks-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }
    .ks-val   { font-size: 12px; font-family: var(--mono); color: var(--text); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }

    /* ── COPY BTN ─────────────────────────────────────── */
    .copy-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--muted);
      font-size: 10px;
      padding: 3px 8px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.12s;
    }
    .copy-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text); background: rgba(255,255,255,0.04); }
    .copy-btn.copied { border-color: rgba(16,185,129,0.35); color: var(--green); background: rgba(16,185,129,0.06); }

    /* ── EMPTY STATE ──────────────────────────────────── */
    .empty { text-align: center; padding: 56px 24px; color: var(--muted); }
    .empty svg { margin: 0 auto 18px; display: block; opacity: 0.2; }
    .empty p { font-size: 13px; line-height: 1.6; }

    /* ── ALERT BANNER ─────────────────────────────────── */
    .alert-banner {
      background: rgba(245,158,11,0.07);
      border: 1px solid rgba(245,158,11,0.2);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--amber);
      animation: tab-enter 0.2s ease-out;
    }

    /* ── MISC ─────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.07); border-radius: 2px; }
    .mono { font-family: var(--mono); }

    /* ── SPINNER ──────────────────────────────────────── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 13px; height: 13px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
    }

    /* ── TOASTS ───────────────────────────────────────── */
    .toast-ok  { padding: 10px 14px; background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.2); border-radius: 8px; font-size: 12px; color: var(--green); font-family: var(--mono); margin-bottom: 14px; animation: tab-enter 0.15s ease-out; }
    .toast-err { padding: 10px 14px; background: rgba(239,68,68,0.08);  border: 1px solid rgba(239,68,68,0.2);  border-radius: 8px; font-size: 12px; color: var(--red);   font-family: var(--mono); margin-bottom: 14px; animation: tab-enter 0.15s ease-out; }
  </style>
</head>
<body>
  <div id="root"><p style="color:#44445a;padding:24px;font-family:monospace;font-size:12px;">Initializing Aegis…</p></div>

  <script>
    window.onerror = function(msg, src, line, col, err) {
      document.getElementById('root').innerHTML =
        '<pre style="color:#ef4444;padding:20px;font-size:12px;white-space:pre-wrap;">' +
        'ERROR: ' + msg + '\nAt: ' + src + ':' + line + '\n' + (err ? err.stack : '') + '</pre>';
    };
    try {
      window._ipc = require('electron').ipcRenderer;
    } catch(e) {
      window._ipc = { invoke: async (ch, ...a) => { console.warn('IPC mock:', ch, a); return null; } };
    }
    window.React    = require('react');
    window.ReactDOM = require('react-dom/client');
  </script>
  <script src="node_modules/babel-standalone/babel.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;
    const ipc = window._ipc;

    // ── ICONS ──────────────────────────────────────────────────────────────────
    const IconOverview = () => (
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
        {[2,7,12].flatMap(x => [2,7,12].map(y =>
          <circle key={x+'-'+y} cx={x} cy={y} r="1.5" fill="currentColor"/>
        ))}
      </svg>
    );
    const IconActivity = () => (
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" strokeWidth="1">
        <circle cx="2"  cy="10" r="1.5" fill="currentColor" stroke="none"/>
        <circle cx="7"  cy="5"  r="1.5" fill="currentColor" stroke="none"/>
        <circle cx="13" cy="10" r="1.5" fill="currentColor" stroke="none"/>
        <line x1="3.5" y1="10" x2="5.5" y2="5"/>
        <line x1="8.5" y1="5"  x2="11.5" y2="10"/>
      </svg>
    );

    // ── ACTIVITY TAB ───────────────────────────────────────────────────────────
    const ActivityTab = ({ activity, pending, onApprove, onDeny }) => {
      const [processing, setProcessing] = useState({});

      const approve = async (id) => {
        setProcessing(p => {var n={};Object.keys(p).forEach(k=>n[k]=p[k]);n[id]='approving';return n;});
        await onApprove(id);
        setProcessing(p => {var n={};Object.keys(p).forEach(k=>n[k]=p[k]);n[id]=null;return n;});
      };
      const deny = async (id) => {
        setProcessing(p => {var n={};Object.keys(p).forEach(k=>n[k]=p[k]);n[id]='denying';return n;});
        await onDeny(id);
        setProcessing(p => {var n={};Object.keys(p).forEach(k=>n[k]=p[k]);n[id]=null;return n;});
      };

      const fmt = ts => new Date(ts).toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
      const pendingRows  = (pending  || []).map(p => Object.assign({}, p, {_pending:true}));
      const resolvedRows = (activity || []).filter(a => a.status !== 'PENDING')
        .sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
      const allRows = pendingRows.concat(resolvedRows).slice(0, 60);

      if (allRows.length === 0) {
        return (
          <div className="tab-pane">
            <div className="card card-interactive">
              <EmptyState message="No activity yet. Requests from the agent will appear here in real time."/>

                              {processing[row.id] === 'approving' ? <span className="spinner"/> : 'Approve'}

        perTxLimit:'0.50', autoApproveThreshold:'1.00',

        whitelistedAddresses:'', blacklistedAddresses:'',
        whitelistedProgramIDs:'', blacklistedProgramIDs:'',
        keywordBlocklist:'', forbiddenActions:'', priorityInstructions:''
      });
      const [saving, setSaving] = useState(false);
      const [saved,  setSaved]  = useState(false);

      useEffect(() => {
        if (!config) return;
        setF({
          dailyBudget:          String(config.dailyBudgetUSDC          || 2),
          weeklyBudget:         String(config.weeklyBudgetUSDC         || 10),
          monthlyBudget:        String(config.monthlyBudgetUSDC        || 50),
          perTxLimit:           String(config.perTransactionLimitUSDC  || 0.5),
          autoApproveThreshold: String(config.autoApproveThresholdUSDC || 1),

          forbiddenActions:     arrStr(config.forbiddenActions),
          priorityInstructions: config.priorityInstructions || ''
        });
      }, [config]);

      const set = k => e => setF(function(p){var n=Object.assign({},p);n[k]=e.target.value;return n;});

      const save = async () => {
        setSaving(true);
        await onSave({
          dailyBudget:          parseFloat(f.dailyBudget)          || 2,
          weeklyBudget:         parseFloat(f.weeklyBudget)         || 10,
          monthlyBudget:        parseFloat(f.monthlyBudget)        || 50,
          perTxLimit:           parseFloat(f.perTxLimit)           || 0.5,
          autoApproveThreshold: parseFloat(f.autoApproveThreshold) || 1,
          allowedTokenMints:    toArr(f.allowedTokenMints),
          blockedTokenMints:    toArr(f.blockedTokenMints),
          whitelistedURLs:      toArr(f.whitelistedURLs),
          blacklistedURLs:      toArr(f.blacklistedURLs),
          whitelistedAddresses: toArr(f.whitelistedAddresses),
          blacklistedAddresses: toArr(f.blacklistedAddresses),
          whitelistedProgramIDs:toArr(f.whitelistedProgramIDs),
          blacklistedProgramIDs:toArr(f.blacklistedProgramIDs),
          keywordBlocklist:     toArr(f.keywordBlocklist),
          forbiddenActions:     toArr(f.forbiddenActions),
          priorityInstructions: f.priorityInstructions
        });
        setSaving(false); setSaved(true);
        setTimeout(() => setSaved(false), 2000);

      const I = (key, type, placeholder) => (
        <input className="form-input" type={type||'text'} step={type==='number'?'0.01':undefined}

              <span className="sec-title">Agent Policy Rules</span>
              <button className="btn btn-primary" onClick={save} disabled={saving}>
                {saving ? <span className="spinner"/> : saved ? '✓ Saved' : 'Save Policy'}

            <AccordionSection title="Spend Controls" defaultOpen={true}>
              <div className="grid-3" style={{marginBottom:'12px'}}>

                <div className="form-group"><label className="form-label">Weekly Budget (USDC)</label>{I('weeklyBudget','number')}</div>
                <div className="form-group"><label className="form-label">Monthly Budget (USDC)</label>{I('monthlyBudget','number')}</div>

                <div className="form-group">
                  <label className="form-label">Blacklisted URLs</label>
                  {T('blacklistedURLs','casino.com\ndrain.io')}

            <AccordionSection title="On-Chain Program Controls">
              <div className="grid-2">

          });
          setResult(r);
        } catch(e) { setResult({error: e.message}); }
        setProv(false);
      };

        setAirdrop(true); setAirdropMsg(null);
        try {
          await ipc.invoke('airdrop-sol');
          setAirdropMsg({ok:true, text:'1 SOL airdropped to your wallet.'});

                <span className="ks-val" style={{color:'var(--green)'}}>● OS Credential Manager (keytar)</span>

                <span className="ks-val" style={{color:'var(--green)'}}>● AES-256 Encrypted File</span>

              </p>
              {airdropMsg && (
                <div className={airdropMsg.ok ? 'toast-ok' : 'toast-err'}>{airdropMsg.ok ? '✓ ' : '✗ '}{airdropMsg.text}</div>
              )}
              <div style={{display:'flex', gap:'10px', flexWrap:'wrap'}}>
                <button className="btn btn-primary" onClick={doAirdrop} disabled={airdropping}>
                  {airdropping ? <span><span className="spinner"/> Airdropping…</span> : 'Airdrop 1 SOL (Devnet)'}
                </button>
                <button className="btn btn-outline" onClick={openFaucet}>Get Devnet USDC ↗</button>
              </div>
            </div>

            <div className="card" style={{width:'100%'}}>
              <div className="sec-hdr"><span className="sec-title">Recovery</span></div>
              <p style={{fontSize:'13px', color:'var(--muted)', marginBottom:'16px', lineHeight:'1.6'}}>
                Share 3 is your offline recovery key. Store it separate from this machine.
                Any 2 of 3 shares reconstruct the private key.
              </p>
              <button className="btn btn-outline" onClick={exportRecovery}>Export Recovery Share</button>
            </div>
          </div>
        );
      }

      return (
        <div className="tab-pane">
          <div className="card" style={{width:'100%'}}>
            <div className="sec-hdr"><span className="sec-title">Provision Agent Wallet</span></div>
            <p style={{fontSize:'13px', color:'var(--muted)', marginBottom:'20px', lineHeight:'1.6'}}>
              Generate a new Solana keypair and distribute the signing key across two secure backends
              using Shamir's Secret Sharing (2-of-3 threshold). Configure initial policy below.
            </p>
            <div className="grid-3" style={{marginBottom:'12px'}}>
              <div className="form-group"><label className="form-label">Daily Budget (USDC)</label><input className="form-input" type="number" step="0.01" value={p.dailyBudget} onChange={set('dailyBudget')}/></div>
              <div className="form-group"><label className="form-label">Weekly Budget (USDC)</label><input className="form-input" type="number" step="0.01" value={p.weeklyBudget} onChange={set('weeklyBudget')}/></div>
              <div className="form-group"><label className="form-label">Monthly Budget (USDC)</label><input className="form-input" type="number" step="0.01" value={p.monthlyBudget} onChange={set('monthlyBudget')}/></div>
            </div>
            <div className="grid-2" style={{marginBottom:'12px'}}>
              <div className="form-group"><label className="form-label">Per-Transaction Limit (USDC)</label><input className="form-input" type="number" step="0.01" value={p.perTxLimit} onChange={set('perTxLimit')}/></div>
              <div className="form-group">
                <label className="form-label">Auto-Approve Below (USDC)</label>
                <input className="form-input" type="number" step="0.01" value={p.autoApproveThreshold} onChange={set('autoApproveThreshold')}/>
                <p className="form-hint">Transactions above this pause for your approval.</p>
              </div>
            </div>
            <div className="form-group" style={{marginBottom:'20px'}}>
              <label className="form-label">Whitelisted URLs (one per line)</label>
              <textarea className="form-textarea" value={p.whitelistedURLs} onChange={set('whitelistedURLs')} placeholder="localhost:9090"/>
            </div>
            {result && result.error    && <div className="toast-err">✗ {result.error}</div>}
            {result && result.publicKey && <div className="toast-ok">✓ Provisioned — {result.publicKey}</div>}
            <button className="btn btn-primary" onClick={provision} disabled={prov}>
              {prov ? <span><span className="spinner"/> Provisioning…</span> : 'Provision Agent Wallet'}
            </button>
          </div>
        </div>
      );
    };

    // ── APP ROOT ───────────────────────────────────────────────────────────────
    function App() {
      const [tab, setTab]           = useState('overview');
      const [walletStatus, setWS]   = useState(null);
      const [config, setConfig]     = useState(null);
      const [stats, setStats]       = useState(null);
      const [activity, setActivity] = useState([]);
      const [pending, setPending]   = useState([]);

      const refresh = useCallback(async () => {
        try {
          var results = await Promise.all([
            ipc.invoke('get-wallet-status'),
            ipc.invoke('get-config'),
            ipc.invoke('get-spend-stats'),
            ipc.invoke('get-activity'),
            ipc.invoke('get-pending')
          ]);
          if (results[0]) setWS(results[0]);
          if (results[1]) setConfig(results[1]);
          if (results[2]) setStats(results[2]);
          setActivity(results[3] || []);
          setPending(results[4]  || []);
        } catch(e) { console.error('Refresh:', e); }
      }, []);

      useEffect(function(){
        refresh();
        var t = setInterval(refresh, 2000);
        return function(){ clearInterval(t); };
      }, [refresh]);

      const handleProvision  = async (policy) => { var r = await ipc.invoke('provision-wallet', policy); await refresh(); return r; };
      const handleSavePolicy = async (policy) => { await ipc.invoke('save-policy', policy); await refresh(); };
      const handleApprove    = async (id)     => { await ipc.invoke('approve-transaction', id); await refresh(); };
      const handleDeny       = async (id)     => { await ipc.invoke('deny-transaction',    id); await refresh(); };

      const shortKey = walletStatus && walletStatus.publicKey
        ? walletStatus.publicKey.slice(0,6) + '…' + walletStatus.publicKey.slice(-4)
        : null;

      const hasPending = pending.length > 0;

      const tabs = [
        {id:'overview', label:'Overview',  Icon:IconOverview,  group:'Monitor'},
        {id:'activity', label:'Activity',  Icon:IconActivity,  group:'Monitor',  badge: pending.length || null},
        {id:'policy',   label:'Policy',    Icon:IconPolicy,    group:'Configure'},
        {id:'wallet',   label:'Wallet',    Icon:IconWallet,    group:'Configure'},
      ];

      const tabTitles = {overview:'Overview', activity:'Transaction Activity', policy:'Policy Rules', wallet:'Wallet & Key Management'};

      return (
        <div style={{display:'flex', height:'100vh', overflow:'hidden', width:'100%'}}>

          {/* SIDEBAR */}
          <div className="sidebar">
            <div className="sidebar-logo">
              <div className="sidebar-logo-mark">
                <div className="sidebar-logo-icon"><IconShield/></div>
                <span className="sidebar-logo-text">AEGIS</span>
              </div>
              <div className="sidebar-logo-sub">Agentic Financial Gateway</div>
            </div>

            {['Monitor','Configure'].map(function(group){
              return (
                <div key={group}>
                  <div className="nav-section-label">{group}</div>
                  {tabs.filter(function(t){return t.group===group;}).map(function(t){
                    return (
                      <div key={t.id} className={'nav-item ' + (tab===t.id?'active':'')} onClick={function(){setTab(t.id);}}>
                        <t.Icon/>
                        <span>{t.label}</span>
                        {t.badge ? <span className="nav-badge">{t.badge}</span> : null}
                      </div>
                    );
                  })}
                </div>
              );
            })}

            <div className="agent-status-block">
              <div className="status-row">
                <div className={'status-dot ' + (walletStatus && walletStatus.provisioned ? '' : 'offline')}/>
                <span>{walletStatus && walletStatus.provisioned ? 'Agent Active' : 'Not Provisioned'}</span>
              </div>
              {shortKey && <div className="status-key">{shortKey}</div>}
            </div>
          </div>

          {/* MAIN */}
          <div className="main">
            <div className={'topbar ' + (hasPending ? 'pending-state' : '')}>
              <div className="topbar-left">
                <span className="topbar-title">{tabTitles[tab]}</span>
              </div>
              <div className="topbar-right">
                {shortKey && <span className="topbar-wallet">{shortKey}</span>}
                {hasPending
                  ? <span className="topbar-status topbar-warn">
                      <span className="topbar-warn-dot"/>
                      {pending.length} pending approval{pending.length>1?'s':''}
                    </span>
                  : <span className="topbar-status">All systems normal</span>}
              </div>
            </div>

            <div className="content">
              {tab==='overview' && <OverviewTab key="overview" stats={stats} walletStatus={walletStatus} pendingCount={pending.length}/>}
              {tab==='activity' && <ActivityTab key="activity" activity={activity} pending={pending} onApprove={handleApprove} onDeny={handleDeny}/>}
              {tab==='policy'   && <PolicyTab   key="policy"   config={config}   onSave={handleSavePolicy}/>}
              {tab==='wallet'   && <WalletTab   key="wallet"   walletStatus={walletStatus} onProvision={handleProvision}/>}
            </div>
          </div>

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
